context:
  version: "4.14.1"

package:
  name: orafce
  version: ${{ version }}

source:
  url: https://github.com/orafce/orafce/archive/refs/tags/VERSION_4_14_1.tar.gz
  sha256: 94431961f4b33bed0782761570d83028fdb0136fdfde0eb23ebadb25e4515bda

build:
  script: |
    make install pkglibdir=$PREFIX/lib \
                 datadir=$PREFIX/share \
                 -j${CPU_COUNT}

requirements:
  build:
    - make
    - ${{ compiler('c') }}
  host:
    - postgresql
    - libpq

tests:
  - script: |
      export TEST_DIR=./test_orafce
      initdb -D $TEST_DIR
      pg_ctl -D $TEST_DIR -l logfile start || cat ./logfile
      psql -c "CREATE EXTENSION \"orafce\";" postgres
      psql -c "SELECT oracle.add_months(date '2005-05-31', 1);" postgres
      pg_ctl stop -D $TEST_DIR

    requirements:
      run:
        - postgresql

about:
  homepage: https://github.com/orafce/orafce
  license: BSD-3-Clause
  summary: Oracle compatibility functions for PostgreSQL
  description: |
    Orafce provides implementations of functions and packages from the Oracle
    RDBMS that are missing in PostgreSQL. This makes migration from Oracle
    to PostgreSQL easier.
  repository: https://github.com/orafce/orafce

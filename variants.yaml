zip_keys:
  - [postgresql, libpq]

python_min:
  - "3.12"

postgresql:
  - 14
  - 15
  - 16
  - 17
  - 18

libpq:
  - 14
  - 15
  - 16
  - 17
  - 18

python:
  - "3.12"

c_stdlib:
  - if: linux
    then:
      - sysroot
  - if: osx
    then:
      - macosx_deployment_target
  - if: win
    then:
      - vs

c_stdlib_version:
  - if: linux
    then:
      - "2.17"
  - if: osx
    then:
      - "11.0"
  - if: win
    then:
      - "*"

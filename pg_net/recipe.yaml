context:
  version: "0.20.2"

package:
  name: pg_net
  version: ${{ version }}

source:
  url: https://github.com/supabase/pg_net/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 30e54d95d2de2578f34f22f877be965c0b81292f4065ca3442cf0c2f75a339d0

build:
  script: |
    make install libpq=$PREFIX/lib/libpq${SHLIB_EXT} \
                 pkglibdir=$PREFIX/lib \
                 datadir=$PREFIX/share \
                 -j${CPU_COUNT}

requirements:
  build:
    - make
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - lld
  host:
    - postgresql
    - libpq
    - libcurl

tests:
  - script: |
      export TEST_DIR=./test_pg_net
      initdb -D $TEST_DIR
      echo "shared_preload_libraries = 'pg_net'" >> $TEST_DIR/postgresql.conf
      pg_ctl -D $TEST_DIR -l logfile start || cat ./logfile
      psql -c "CREATE EXTENSION \"pg_net\";" postgres
      pg_ctl stop -D $TEST_DIR

    requirements:
      run:
        - postgresql

about:
  homepage: https://github.com/supabase/pg_net
  license: Apache-2.0
  summary: Async networking for PostgreSQL
  description: |
    pg_net is a PostgreSQL extension exposing a SQL interface for async networking with a focus on scalability and UX.
  repository: https://github.com/supabase/pg_net

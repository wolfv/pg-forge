context:
  version: "1.3.4"

package:
  name: pgtap
  version: ${{ version }}

source:
  url: https://github.com/theory/pgtap/archive/refs/tags/v${{ version }}.tar.gz
  sha256: d2c951afb296a001d21785611a8e966e3f8fa3f5bfbd929396a5130c0152f314

build:
  script: |
    make install PERL=$(which perl) \
                 pkglibdir=$PREFIX/lib \
                 datadir=$PREFIX/share \
                 -j${CPU_COUNT}

requirements:
  build:
    - make
    - perl
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - lld
  host:
    - perl
    - postgresql
    - libpq

tests:
  - script: |
      export TEST_DIR=./test_pgtap
      initdb -D $TEST_DIR
      pg_ctl -D $TEST_DIR -l logfile start || cat ./logfile
      psql -c "CREATE EXTENSION \"pgtap\";" postgres
      psql -c "SELECT plan(1); SELECT pass('pgtap works'); SELECT finish();" postgres
      pg_ctl stop -D $TEST_DIR

    requirements:
      run:
        - postgresql

about:
  homepage: https://pgtap.org/
  license: PostgreSQL
  summary: Unit testing framework for PostgreSQL
  description: |
    pgTAP is a suite of database functions that make it easy to write
    TAP-emitting unit tests in psql scripts or xUnit-style test functions.
  repository: https://github.com/theory/pgtap

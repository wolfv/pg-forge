context:
  version: "1.9.1"
  tag: REL${{ version | replace(".", "_") }}

package:
  name: pg_squeeze
  version: ${{ version }}

source:
  url: https://github.com/cybertec-postgresql/pg_squeeze/archive/refs/tags/${{ tag }}.tar.gz
  sha256: 2ac81fe38bca0e34a861f0437d0958ae5ebaa2aafbab529d9373fe2c02186872

build:
  script: |
    make install pkglibdir=$PREFIX/lib \
                 datadir=$PREFIX/share \
                 -j${CPU_COUNT}

requirements:
  build:
    - make
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - lld
  host:
    - postgresql
    - libpq

tests:
  - script: |
      export TEST_DIR=./test_pg_squeeze
      initdb -D $TEST_DIR
      echo "shared_preload_libraries = 'pg_squeeze'" >> $TEST_DIR/postgresql.conf
      echo "wal_level = logical" >> $TEST_DIR/postgresql.conf
      pg_ctl -D $TEST_DIR -l logfile start || cat ./logfile
      psql -c "CREATE EXTENSION \"pg_squeeze\";" postgres
      pg_ctl stop -D $TEST_DIR

    requirements:
      run:
        - postgresql

about:
  homepage: https://github.com/cybertec-postgresql/pg_squeeze
  license: BSD-2-Clause
  summary: Online table compaction for PostgreSQL
  description: |
    pg_squeeze is a PostgreSQL extension that removes unused space from a
    table and optionally sorts tuples according to a particular index.
    It works online, without holding exclusive locks during processing.
  repository: https://github.com/cybertec-postgresql/pg_squeeze

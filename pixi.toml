[workspace]
name = "pg-forge"
version = "0.1.0"
description = "Add a short description here"
authors = ["Wolf Vollprecht <w.vollprecht@gmail.com>"]
channels = ["conda-forge"]
platforms = ["osx-arm64", "linux-64", "win-64", "osx-64", "linux-aarch64"]

[tasks]
bump = "bash bump_recipes.sh"

[dependencies]
rattler-build = ">=0.60.0,<0.61"

[feature.lint.dependencies]
prettier = "*"

[feature.lint.tasks]
fmt = "prettier --write '**/*.yaml'"

[environments]
lint = ["lint"]
